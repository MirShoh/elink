# /etc/nginx/sites-available/elink.uz
# Faollash: ln -s /etc/nginx/sites-available/elink.uz /etc/nginx/sites-enabled/
# Test:     nginx -t
# Reload:   systemctl reload nginx

server {
    listen 80;
    server_name elink.uz www.elink.uz;

    # www → non-www redirect
    if ($host = www.elink.uz) {
        return 301 https://elink.uz$request_uri;
    }

    # HTTP → HTTPS redirect
    return 301 https://elink.uz$request_uri;
}

server {
    listen 443 ssl http2;
    server_name elink.uz;

    # SSL (certbot o'rnatilgan bo'lsa)
    ssl_certificate     /etc/letsencrypt/live/elink.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/elink.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Xavfsizlik headerlari
    add_header X-Frame-Options        "DENY"                            always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Netlify Functions proxy → Node.js servermizga ──────────
    location /.netlify/functions/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # ── Share URL-lar: /share-XXXX → index.html (SPA) ──────────
    location ~* ^/share-[a-z0-9]+$ {
        try_files $uri /index.html;
    }

    # ── Statik fayllar ─────────────────────────────────────────
    root /var/www/elink;
    index index.html;

    # HTML — hech qachon cache'lamaslik
    location ~* \.(html)$ {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri /index.html;
    }

    # JS — muhim fayllar hech qachon cache'lanmasin
    location ~* ^/(data|core|render|builder|sw)\.js$ {
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # CSS, fontlar va boshqa statik — uzoq cache
    location ~* \.(css|woff2|woff|ttf|png|jpg|jpeg|svg|ico|webp|webmanifest)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback — barcha yo'llar index.html ga
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Xatolik sahifalari
    error_page 404 /index.html;
}
