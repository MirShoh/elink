[build]
  command   = "npm install && npx tailwindcss -i input.css -o tailwind.css --minify"
  functions = "netlify/functions"
  publish   = "."

[functions]
  node_bundler = "esbuild"

# JS va CSS ni Netlify deploy vaqtida minify qilish
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle  = false
  minify  = true

[build.processing.js]
  bundle  = false
  minify  = true

[build.processing.html]
  pretty_urls = true

# ── Xavfsizlik headerlari (barcha sahifalar) ──────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"

# ── HTML — hech qachon cache'lamaslik (har deploy'da yangi) ──────
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/pentester.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── JS ma'lumot va logika — har deploy'da yangi ──────────────────
[[headers]]
  for = "/data.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Vary = "Accept-Encoding"

[[headers]]
  for = "/script.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/widgets.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── CSS — versiyalash bilan uzoq cache (1 yil) ───────────────────
[[headers]]
  for = "/tailwind.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/widgets-style.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Manifest va SW ───────────────────────────────────────────────
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── SEO fayllari ─────────────────────────────────────────────────
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "text/plain; charset=utf-8"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "application/xml; charset=utf-8"

# ── HSTS — HTTPS majburiy qilish (SEO uchun muhim) ───────────────
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ── Redirects: www → non-www (SEO canonical) ─────────────────────
[[redirects]]
  from   = "https://www.elink.uz/*"
  to     = "https://elink.uz/:splat"
  status = 301
  force  = true

# ── SPA fallback (JS router uchun) ───────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200